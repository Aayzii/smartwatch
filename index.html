<!DOCTYPE html>
<html>
<head>
    <title>Smart Watch Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <h1>Watch Status: <span id="emergency-status">NORMAL</span></h1>
    <p>Temperature: <span id="temp">--</span> °C</p>
    <p>Location: <span id="coords">Waiting for GPS...</span></p>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div id="map" style="height: 400px; width: 100%;"></div>

    <script>
        // 1. Initialize Leaflet Map
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        // 2. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAWH3csnKQB2atKdm0p2o4LxmOkYD25dhM", 
            databaseURL: "https://smartwatch-demo-2fe0e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smartwatch-demo-2fe0e",
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. LISTEN FOR ALL DATA
        db.ref('Watch').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return; // Exit if no data exists

            // Update Temperature
            if (data.Temperature) {
                document.getElementById('temp').innerText = data.Temperature.toFixed(1);
            }

            // Update Emergency Status & UI Colors
            const statusEl = document.getElementById('emergency-status');
            if(data.Emergency == 1) {
                statusEl.innerText = "!! FALL DETECTED !!";
                statusEl.style.color = "red";
                document.body.style.backgroundColor = "#ffcccc";
            } else {
                statusEl.innerText = "NORMAL";
                statusEl.style.color = "black";
                document.body.style.backgroundColor = "white";
            }

            // Update Map and Coordinates
            const lat = data.Latitude;
            const lon = data.Longitude;
            if(lat && lon) {
                var newLatLng = new L.LatLng(lat, lon);
                marker.setLatLng(newLatLng);
                
                // Only move the camera if it's the first time or if the position changed significantly
                map.panTo(newLatLng);
                if (map.getZoom() < 10) map.setZoom(15); 
                
                document.getElementById('coords').innerText = lat.toFixed(4) + ", " + lon.toFixed(4);
            }
        });
    </script>
</body>
</html>
