<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Watch Pro Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 1. Full Page Map Setup */
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; transition: filter 0.5s; }

        /* 2. Floating Data Panel (Left) */
        .side-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 220px; display: flex; flex-direction: column; gap: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .glass-card h3 { margin: 0 0 8px 0; font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 1.2px; }
        .glass-card p { margin: 5px 0; font-weight: bold; font-size: 1.1rem; color: #111; }
        .glass-card span { color: #2196F3; }

        /* 3. Top Right Info (Time & Date) */
        .top-info {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            text-align: right; pointer-events: none;
        }
        .last-update { 
            font-size: 0.85rem; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 12px;
            line-height: 1.4;
        }

        /* 4. Action Button (Bottom Right) */
        .action-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 10;
            width: 80px; height: 80px; border-radius: 50%;
            background: #2196F3; color: white; border: none;
            cursor: pointer; box-shadow: 0 10px 20px rgba(33, 150, 243, 0.4);
            font-weight: bold; font-size: 0.75rem; transition: all 0.2s ease;
        }
        .action-btn:hover { background: #1976D2; transform: translateY(-2px); }
        .action-btn:active { transform: scale(0.9); }

        /* 5. Emergency Overlay */
        #emergency-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.3);
            z-index: 5; display: none; pointer-events: none;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { background: rgba(255, 0, 0, 0.2); }
            to { background: rgba(255, 0, 0, 0.5); }
        }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .side-panel { width: calc(100% - 40px); }
            .top-info { top: auto; bottom: 120px; left: 20px; text-align: left; right: auto; }
        }
    </style>
</head>
<body>

    <div id="emergency-overlay"></div>
    <div id="map"></div>

    <div class="top-info">
        <div class="last-update">
            <div id="sync-date">--/--/----</div>
            <div id="sync-time" style="font-weight: bold; font-size: 1rem;">--:--:--</div>
        </div>
    </div>

    <div class="side-panel">
        <div class="glass-card" id="main-status">
            <h3>Device Status</h3>
            <p id="emergency-status">INITIALIZING...</p>
        </div>

        <div class="glass-card">
            <h3>Environment</h3>
            <p>Temp: <span id="temp">--</span>°C</p>
            <p>Pres: <span id="pres">--</span>hPa</p>
        </div>

        <div class="glass-card">
            <h3>Motion Analysis</h3>
            <p>X:<span id="ax">--</span> Y:<span id="ay">--</span></p>
            <p>Z:<span id="az">--</span></p>
        </div>

        <div class="glass-card">
            <h3>GPS Signal</h3>
            <p>Sats: <span id="sats">0</span></p>
            <p style="font-size: 0.7rem; color: #777;" id="coords">WAITING FOR LOCK</p>
        </div>
    </div>

    <button class="action-btn" onclick="triggerMotor()">VIBRATE<br>WATCH</button>

    <script>
        // --- 1. Map Initialization ---
        // 'zoomControl: false' makes it look more like an embedded GPS unit
        var map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        // --- 2. Firebase Connection ---
        const firebaseConfig = {
            apiKey: "AIzaSyAWH3csnKQB2atKdm0p2o4LxmOkYD25dhM", 
            databaseURL: "https://smartwatch-demo-2fe0e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smartwatch-demo-2fe0e",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 3. Live Data Stream ---
        db.ref('Watch').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Update Time AND Date
            const now = new Date();
            document.getElementById('sync-time').innerText = now.toLocaleTimeString();
            document.getElementById('sync-date').innerText = now.toLocaleDateString(undefined, { 
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' 
            });

            // Update Sensors
            if (data.Temperature) document.getElementById('temp').innerText = data.Temperature.toFixed(1);
            if (data.Pressure) document.getElementById('pres').innerText = data.Pressure.toFixed(0);
            
            document.getElementById('ax').innerText = data.AccelX || "0";
            document.getElementById('ay').innerText = data.AccelY || "0";
            document.getElementById('az').innerText = data.AccelZ || "0";

            // Emergency Logic
            const statusEl = document.getElementById('emergency-status');
            const overlay = document.getElementById('emergency-overlay');
            if(data.Emergency == 1) {
                statusEl.innerText = "🚨 FALL DETECTED";
                statusEl.style.color = "red";
                overlay.style.display = "block";
            } else {
                statusEl.innerText = "SAFE / NORMAL";
                statusEl.style.color = "#2196F3";
                overlay.style.display = "none";
            }

            // Map and GPS Update
            document.getElementById('sats').innerText = data.Satellites || 0;
            if(data.Latitude && data.Longitude) {
                const lat = parseFloat(data.Latitude);
                const lon = parseFloat(data.Longitude);
                var newPoint = new L.LatLng(lat, lon);
                
                marker.setLatLng(newPoint);
                map.panTo(newPoint);
                if (map.getZoom() < 12) map.setZoom(16);
                
                document.getElementById('coords').innerText = lat.toFixed(5) + ", " + lon.toFixed(5);
            }
        });

        // --- 4. Remote Control ---
        function triggerMotor() {
            db.ref('Watch/MotorRemote').set(1);
            setTimeout(() => {
                db.ref('Watch/MotorRemote').set(0);
            }, 3000); // Vibrate for 3 seconds
        }
    </script>
</body>
</html>
